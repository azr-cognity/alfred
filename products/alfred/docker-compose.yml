services:

  # ── BASE DE DATOS ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alfred_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alfred
      POSTGRES_PASSWORD: alfred_dev_password
      POSTGRES_DB: alfred_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfred -d alfred_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── POLICY ENGINE ────────────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: alfred_opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./infra/opa/policies:/policies
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PANEL DE BASE DE DATOS ───────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: alfred_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alfred.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

  # ── REDIS ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alfred_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FRONTEND ─────────────────────────────────────────────────────────────────
  # Next.js 15 en modo dev con hot reload via volumen.
  # Accesible en http://localhost:3000
  alfred-ui:
    build:
      context: ./alfred-ui
      dockerfile: Dockerfile.dev
    container_name: alfred_ui
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ./alfred-ui:/app          # hot reload: cambios locales → contenedor
      - /app/node_modules         # evita sobreescribir node_modules del contenedor
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000   # FastAPI corre fuera de Docker
      - WATCHPACK_POLLING=true    # necesario para hot reload en Windows + Docker
    depends_on:
      - redis

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
